<!DOCTYPE html>
<html>
<head>
    <title>Community Leaderboard - 3-Day Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: #2ecc71;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #dff0d8;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .back-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 12px;
            text-align: center;
            background: black;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .back-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<h1>🏆 Community Leaderboard</h1>

<table>
    <tr>
        <th>Rank</th>
        <th>Username</th>
        <th>Sprints Completed</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.completed_sprints }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No sprints completed yet.</td>
    </tr>
    {% endfor %}
</table>

<a href="{% url 'dashboard' %}" class="back-btn">⬅ Back to Dashboard</a>

</body>
</html>
