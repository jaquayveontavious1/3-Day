<!DOCTYPE html>
<html>
<head>
    <title>Update Sprint - 3-Day Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        h1 { text-align: center; margin-bottom: 25px; }

        .goal-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            font-size: 17px;
        }

        .goal-item input {
            margin-right: 12px;
            transform: scale(1.3);
            cursor: pointer;
        }

        select, button {
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            width: 100%;
        }

        button {
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        .progress {
            background: #e0e0e0;
            border-radius: 20px;
            height: 28px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: #2ecc71;
            height: 100%;
            text-align: center;
            color: white;
            line-height: 28px;
            font-weight: bold;
            transition: width 0.6s ease-in-out;
        }

        .status-label {
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
        }

        #timer {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>{{ sprint.title }}</h1>

    <!-- Countdown Timer -->
    <h3>Time Remaining:</h3>
    <div id="timer"></div>

    <form method="POST">
        {% csrf_token %}

        <h3>Your Goals</h3>
        {% for goal in goals %}
            <div class="goal-item">
                <input type="checkbox" name="goal_{{ goal.id }}"
                       {% if goal.is_completed %}checked{% endif %}>
                <label>{{ goal.text }}</label>
            </div>
        {% endfor %}

        <h3>Status</h3>
        <select name="status">
            <option value="Not Started" {% if user_status.status == "Not Started" %}selected{% endif %}>Not Started</option>
            <option value="In Progress" {% if user_status.status == "In Progress" %}selected{% endif %}>In Progress</option>
            <option value="Paused" {% if user_status.status == "Paused" %}selected{% endif %}>Paused</option>
            <option value="Completed" {% if user_status.status == "Completed" %}selected{% endif %}>Completed</option>
        </select>

        <!-- Progress Bar -->
        <div class="progress">
            <div class="progress-bar" style="width: {{ user_status.progress }}%;">
                {{ user_status.progress }}%
            </div>
        </div>

        <div class="status-label">
            Current Status: {{ user_status.status }}
        </div>

        <button type="submit">Save Progress</button>
    </form>
</div>

<!-- JS Countdown Timer -->
<script>
let remaining = {{ remaining_seconds }};

function updateTimer() {
    if (remaining <= 0) {
        document.getElementById('timer').innerHTML = "Sprint Ended!";
        clearInterval(timerInterval);
        return;
    }

    let hours = Math.floor(remaining / 3600);
    let minutes = Math.floor((remaining % 3600) / 60);
    let seconds = remaining % 60;

    document.getElementById('timer').innerHTML =
        hours + "h " + minutes + "m " + seconds + "s";

    remaining--;
}

updateTimer();  // initial display
let timerInterval = setInterval(updateTimer, 1000);
</script>
</body>
</html>
