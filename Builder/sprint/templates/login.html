<!DOCTYPE html>
<html>
    <head>
        {% load static%}
        <title>Login - 3-Day Builder Sprint</title>
        <style>
            body { font-family: Arial; background-color: #E6F5EA; display: flex; justify-content: center; align-items: center; height: 100vh; }
            body::before{
                content:"";
                position:fixed;
                inset:0;
                background: url("{% static 'images/background.webp' %}") no-repeat center center;
                background-size: 105% auto; /* slight zoom */
                filter: blur(1px);
                transform: scale(1); /* prevents blur edges */
                z-index: -1;
            }
            .brand {
                font-weight:bold;
                margin-bottom:10px;
                font-size:36px;
            }
            .subtitle {
                font-size: 14px;
                color: #555;
                margin-bottom: 20px;
            }
            hr {
                margin: 20px 0;
                border: none;
                border-top: 1px solid #ddd;
            }
            .signup-link {
                color: #2ecc71;
                font-weight: bold;
                text-decoration: none;
            }

            .signup-link:hover {
                text-decoration: underline;
            }

            .forgot {
                margin-top: 10px;
                font-size: 14px;
            }

            .forgot a {
                color: #555;
                text-decoration: none;
            }

            .forgot a:hover {
                text-decoration: underline;
            }

            .login-box { background: white; padding: 60px; border-radius: 14px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px;text-align:center; }
            input { width: 100%; padding: 10px; margin: 10px 0; }
            button { background: #43A047; color: white; padding: 10px; margin-top:15px; width: 90%; border: none; border-radius: 4px; cursor: pointer; }
            button:hover { background: #2E7D32; opacity:0.9; }
            .signup{color:#43A047; text-decoration:none}
        </style>
    </head>
    <body>
        <div class="login-box">
            <div class='brand'>
                🚀 <span>3-Day Builder Sprint</span>

            </div>
            <h2>Welcome Back!</h2>
            <p class='subtitle'>Log in to continue your sprint</p>
            <form method="post">
                {% csrf_token %}
                <input type="email" name="username" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <hr>

            <p>Don't have an account? 
                <a href="{% url 'signup' %}" class="signup">Sign up</a>
            </p>
            <p class='forgot'>
                <a href='#'>Forgot password?</p>
            </p>
        </div>
    </body>
</html>
